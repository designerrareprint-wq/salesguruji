<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SalesGuru – AI Sales Training</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f1a;
    --surface: #161928;
    --card: #1e2235;
    --border: #2a2f4a;
    --accent: #f5a623;
    --accent2: #4f8ef7;
    --success: #3ecf8e;
    --danger: #f55a5a;
    --text: #f0f2ff;
    --muted: #8890b0;
    --radius: 14px;
    --font: 'Sora', sans-serif;
    --body: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: var(--body); min-height: 100vh; overflow-x: hidden; }
  h1,h2,h3 { font-family: var(--font); }

  /* ---- SCREENS ---- */
  .screen { display: none; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  /* ---- ONBOARDING ---- */
  #screen-onboard {
    background: linear-gradient(160deg, #0d0f1a 0%, #1a1035 100%);
    align-items: center; justify-content: center; padding: 2rem 1.5rem; text-align: center;
  }
  .logo-badge { font-size: 3.5rem; margin-bottom: 1rem; }
  .onboard-title { font-size: 2rem; font-weight: 700; color: var(--accent); margin-bottom: .5rem; }
  .onboard-sub { color: var(--muted); font-size: .95rem; line-height: 1.6; margin-bottom: 2rem; }
  .form-group { width: 100%; max-width: 380px; margin-bottom: 1rem; }
  .form-group label { display: block; font-size: .8rem; color: var(--muted); margin-bottom: .4rem; text-align: left; letter-spacing: .05em; text-transform: uppercase; }
  .form-group input, .form-group select {
    width: 100%; padding: .85rem 1rem; background: var(--card);
    border: 1.5px solid var(--border); border-radius: 10px; color: var(--text);
    font-family: var(--body); font-size: .95rem; outline: none; transition: border .2s;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent2); }
  .form-group select option { background: var(--card); }
  .btn-primary {
    width: 100%; max-width: 380px; padding: 1rem; background: var(--accent);
    color: #0d0f1a; font-family: var(--font); font-weight: 700; font-size: 1rem;
    border: none; border-radius: 10px; cursor: pointer; transition: transform .15s, opacity .15s;
  }
  .btn-primary:active { transform: scale(.97); opacity: .9; }

  /* ---- HOME / DASHBOARD ---- */
  #screen-home { padding: 0; }
  .top-bar {
    background: var(--surface); padding: 1.2rem 1.3rem .9rem;
    border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
  }
  .top-bar .greeting { font-size: .8rem; color: var(--muted); }
  .top-bar .username { font-family: var(--font); font-size: 1.1rem; font-weight: 700; color: var(--accent); }
  .xp-pill {
    background: var(--card); border: 1.5px solid var(--border); border-radius: 20px;
    padding: .35rem .8rem; font-size: .8rem; font-weight: 600; display: flex; align-items: center; gap: 6px;
  }
  .xp-pill span { color: var(--accent); font-family: var(--font); }
  .scroll-body { flex: 1; overflow-y: auto; padding: 1.2rem; }

  .section-title { font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .8rem; margin-top: 1.4rem; }
  .section-title:first-child { margin-top: 0; }

  /* Progress banner */
  .progress-banner {
    background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius);
    padding: 1rem 1.2rem; margin-bottom: 1rem;
  }
  .progress-banner .pb-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: .6rem; }
  .pb-label { font-family: var(--font); font-size: .9rem; font-weight: 600; }
  .pb-pct { font-size: .8rem; color: var(--accent); font-weight: 600; }
  .prog-bar { background: var(--border); border-radius: 20px; height: 7px; overflow: hidden; }
  .prog-fill { background: linear-gradient(90deg, var(--accent2), var(--accent)); height: 100%; border-radius: 20px; transition: width .5s; }

  /* Topic cards */
  .topics-grid { display: flex; flex-direction: column; gap: .7rem; }
  .topic-card {
    background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius);
    padding: 1rem 1.1rem; display: flex; align-items: center; gap: .9rem;
    cursor: pointer; transition: border-color .2s, transform .1s;
    text-decoration: none; color: inherit;
  }
  .topic-card:active { transform: scale(.98); }
  .topic-card.unlocked { border-color: var(--border); }
  .topic-card.completed { border-color: var(--success); }
  .topic-card.locked { opacity: .45; pointer-events: none; }
  .topic-card.active-topic { border-color: var(--accent); }
  .topic-icon { font-size: 1.6rem; min-width: 2.2rem; text-align: center; }
  .topic-info { flex: 1; }
  .topic-name { font-family: var(--font); font-size: .9rem; font-weight: 600; }
  .topic-sub { font-size: .75rem; color: var(--muted); margin-top: 2px; }
  .topic-badge {
    font-size: .7rem; padding: .25rem .6rem; border-radius: 20px; font-weight: 600; white-space: nowrap;
  }
  .badge-done { background: rgba(62,207,142,.15); color: var(--success); }
  .badge-go { background: rgba(245,166,35,.15); color: var(--accent); }
  .badge-lock { background: rgba(136,144,176,.1); color: var(--muted); }

  /* Level arena */
  .level-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: .5rem; }
  .level-btn {
    background: var(--card); border: 1.5px solid var(--border); border-radius: 10px;
    padding: .7rem .3rem; text-align: center; cursor: pointer; transition: border-color .2s;
    font-family: var(--font); font-size: .75rem; font-weight: 600;
  }
  .level-btn .lv-num { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
  .level-btn.locked-lv { opacity: .4; pointer-events: none; }
  .level-btn.active-lv { border-color: var(--accent2); }

  /* ---- LEARN SCREEN ---- */
  #screen-learn { padding: 0; }
  .learn-header {
    background: var(--surface); padding: 1rem 1.2rem;
    border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: .8rem;
  }
  .back-btn {
    background: var(--card); border: 1.5px solid var(--border); border-radius: 8px;
    width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 1rem; color: var(--text); flex-shrink: 0;
  }
  .learn-title { font-family: var(--font); font-size: 1rem; font-weight: 700; }
  .learn-body { flex: 1; overflow-y: auto; padding: 1.3rem; }
  .learn-icon { font-size: 3rem; text-align: center; margin-bottom: 1rem; }
  .learn-heading { font-family: var(--font); font-size: 1.4rem; font-weight: 700; margin-bottom: .5rem; }
  .learn-intro { color: var(--muted); font-size: .9rem; line-height: 1.65; margin-bottom: 1.4rem; }
  .tip-card {
    background: var(--card); border-left: 3px solid var(--accent); border-radius: 10px;
    padding: 1rem 1.1rem; margin-bottom: .8rem;
  }
  .tip-card .tip-label { font-size: .7rem; text-transform: uppercase; color: var(--accent); font-weight: 700; margin-bottom: .3rem; letter-spacing: .06em; }
  .tip-card p { font-size: .88rem; line-height: 1.6; }
  .author-quote {
    background: rgba(79,142,247,.08); border: 1.5px solid rgba(79,142,247,.2);
    border-radius: 10px; padding: 1rem 1.1rem; margin-bottom: 1.4rem;
  }
  .author-quote p { font-size: .88rem; line-height: 1.6; font-style: italic; margin-bottom: .4rem; }
  .author-quote .author-name { font-size: .75rem; color: var(--accent2); font-weight: 600; }
  .practice-cta {
    background: var(--accent); color: #0d0f1a; font-family: var(--font); font-weight: 700;
    font-size: 1rem; border: none; border-radius: 12px; padding: 1rem; width: 100%;
    cursor: pointer; transition: transform .15s; margin-top: 1rem;
  }
  .practice-cta:active { transform: scale(.97); }

  /* ---- PRACTICE SCREEN ---- */
  #screen-practice { padding: 0; }
  .practice-header {
    background: var(--surface); padding: 1rem 1.2rem;
    border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: .8rem;
  }
  .scenario-box {
    background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius);
    padding: 1.2rem; margin-bottom: 1.2rem;
  }
  .scenario-label { font-size: .7rem; text-transform: uppercase; color: var(--accent2); font-weight: 700; letter-spacing: .08em; margin-bottom: .5rem; }
  .scenario-text { font-size: .92rem; line-height: 1.6; font-weight: 500; }
  .options-list { display: flex; flex-direction: column; gap: .7rem; margin-bottom: 1.2rem; }
  .option-btn {
    background: var(--card); border: 1.5px solid var(--border); border-radius: 12px;
    padding: .95rem 1.1rem; text-align: left; cursor: pointer; transition: border-color .2s;
    font-family: var(--body); font-size: .88rem; line-height: 1.5; color: var(--text);
    display: flex; align-items: flex-start; gap: .7rem;
  }
  .option-btn:active { transform: scale(.98); }
  .opt-letter {
    background: var(--border); border-radius: 6px; min-width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center; font-weight: 700;
    font-size: .75rem; font-family: var(--font); flex-shrink: 0; margin-top: 1px;
  }
  .option-btn.correct { border-color: var(--success); background: rgba(62,207,142,.07); }
  .option-btn.correct .opt-letter { background: var(--success); color: #0d0f1a; }
  .option-btn.wrong { border-color: var(--danger); background: rgba(245,90,90,.07); }
  .option-btn.wrong .opt-letter { background: var(--danger); color: #fff; }
  .feedback-box {
    border-radius: 12px; padding: 1rem 1.1rem; margin-bottom: 1rem; display: none;
  }
  .feedback-box.show { display: block; }
  .feedback-box.fb-wrong { background: rgba(245,90,90,.1); border: 1.5px solid rgba(245,90,90,.3); }
  .feedback-box.fb-correct { background: rgba(62,207,142,.1); border: 1.5px solid rgba(62,207,142,.3); }
  .fb-title { font-family: var(--font); font-size: .85rem; font-weight: 700; margin-bottom: .4rem; }
  .fb-wrong .fb-title { color: var(--danger); }
  .fb-correct .fb-title { color: var(--success); }
  .fb-text { font-size: .83rem; line-height: 1.6; color: var(--muted); }
  .next-btn {
    background: var(--success); color: #0d0f1a; font-family: var(--font); font-weight: 700;
    font-size: .95rem; border: none; border-radius: 12px; padding: .95rem; width: 100%;
    cursor: pointer; display: none; margin-top: .5rem;
  }
  .next-btn.show { display: block; }
  .retry-btn {
    background: transparent; color: var(--accent); font-family: var(--font); font-weight: 600;
    font-size: .9rem; border: 1.5px solid var(--accent); border-radius: 12px; padding: .9rem; width: 100%;
    cursor: pointer; display: none; margin-top: .5rem;
  }
  .retry-btn.show { display: block; }
  .practice-body { flex: 1; overflow-y: auto; padding: 1.3rem; }

  /* ---- AI LEVEL ARENA ---- */
  #screen-arena { padding: 0; }
  .arena-header {
    background: var(--surface); padding: 1rem 1.2rem;
    border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;
  }
  .arena-chat { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: .8rem; }
  .msg { max-width: 85%; }
  .msg.ai { align-self: flex-start; }
  .msg.user { align-self: flex-end; }
  .msg-bubble {
    padding: .85rem 1rem; border-radius: 16px; font-size: .88rem; line-height: 1.6;
  }
  .msg.ai .msg-bubble { background: var(--card); border: 1.5px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.user .msg-bubble { background: var(--accent2); color: #fff; border-bottom-right-radius: 4px; }
  .msg-label { font-size: .68rem; color: var(--muted); margin-bottom: 3px; font-weight: 600; letter-spacing: .04em; }
  .msg.user .msg-label { text-align: right; }
  .arena-options { padding: .8rem 1rem 1.2rem; display: flex; flex-direction: column; gap: .5rem; background: var(--surface); border-top: 1px solid var(--border); }
  .arena-opt {
    background: var(--card); border: 1.5px solid var(--border); border-radius: 10px;
    padding: .75rem .9rem; font-size: .85rem; cursor: pointer; text-align: left;
    color: var(--text); font-family: var(--body); transition: border-color .15s;
  }
  .arena-opt:active { border-color: var(--accent2); }
  .win-banner {
    background: linear-gradient(135deg, #1a3a1a, #0d1f0d); border: 2px solid var(--success);
    border-radius: var(--radius); padding: 1.5rem; text-align: center; margin: 1rem;
  }
  .win-banner .win-icon { font-size: 3rem; margin-bottom: .5rem; }
  .win-banner h2 { font-size: 1.4rem; color: var(--success); margin-bottom: .4rem; }
  .win-banner p { font-size: .85rem; color: var(--muted); }

  /* ---- LOADING ---- */
  .loading-dots { display: flex; gap: 4px; padding: .85rem 1rem; }
  .loading-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
  .loading-dots span:nth-child(2) { animation-delay: .2s; }
  .loading-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  .streak-bar { display: flex; gap: .4rem; margin-bottom: .6rem; }
  .streak-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); }
  .streak-dot.on { background: var(--accent); }

  /* Confetti placeholder */
  #confetti { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 999; }
</style>
</head>
<body>

<canvas id="confetti"></canvas>

<!-- ===================== ONBOARDING ===================== -->
<div id="screen-onboard" class="screen active">
  <div class="logo-badge">🏆</div>
  <h1 class="onboard-title">SalesGuru AI</h1>
  <p class="onboard-sub">Master the world's best sales techniques.<br>Learn. Practice. Close deals.</p>
  <div class="form-group"><label>Your Name</label><input id="inp-name" type="text" placeholder="e.g. Rahul Sharma"></div>
  <div class="form-group"><label>Your Business Type</label>
    <select id="inp-biz">
      <option value="">-- Select your business --</option>
      <option value="printing">Printing Company</option>
      <option value="medical_store">Medical / Pharmacy Store</option>
      <option value="clinic">Clinic / Healthcare</option>
      <option value="mobile_shop">Mobile / Electronics Shop</option>
      <option value="clothing">Clothing / Fashion Store</option>
      <option value="beauty">Beauty Parlour / Salon</option>
      <option value="real_estate">Real Estate</option>
      <option value="insurance">Insurance</option>
      <option value="software">Software / IT Services</option>
      <option value="restaurant">Restaurant / Food Business</option>
      <option value="general">General Sales</option>
    </select>
  </div>
  <div class="form-group"><label>Your Product / Service (optional)</label><input id="inp-product" type="text" placeholder="e.g. Business Cards, Flex Printing"></div>
  <button class="btn-primary" onclick="startApp()">Start Training 🚀</button>
</div>

<!-- ===================== HOME / DASHBOARD ===================== -->
<div id="screen-home" class="screen">
  <div class="top-bar">
    <div>
      <div class="greeting" id="greeting-text">Good morning,</div>
      <div class="username" id="user-display">Champion</div>
    </div>
    <div class="xp-pill">⚡ XP <span id="xp-count">0</span></div>
  </div>
  <div class="scroll-body">
    <div class="progress-banner">
      <div class="pb-top"><span class="pb-label">Overall Progress</span><span class="pb-pct" id="prog-pct">0%</span></div>
      <div class="streak-bar" id="streak-bar"></div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>

    <div class="section-title">📚 Sales Topics</div>
    <div class="topics-grid" id="topics-grid"></div>

    <div class="section-title">⚔️ Level Arena – Practice With AI Customer</div>
    <div class="level-grid" id="level-grid"></div>
    <div style="height: 2rem;"></div>
  </div>
</div>

<!-- ===================== LEARN SCREEN ===================== -->
<div id="screen-learn" class="screen">
  <div class="learn-header">
    <div class="back-btn" onclick="goHome()">←</div>
    <div class="learn-title" id="learn-title">Topic</div>
  </div>
  <div class="learn-body" id="learn-body"></div>
</div>

<!-- ===================== PRACTICE SCREEN ===================== -->
<div id="screen-practice" class="screen">
  <div class="practice-header">
    <div class="back-btn" onclick="goLearn()">←</div>
    <div class="learn-title" id="practice-title">Practice</div>
  </div>
  <div class="practice-body" id="practice-body"></div>
</div>

<!-- ===================== ARENA SCREEN ===================== -->
<div id="screen-arena" class="screen">
  <div class="arena-header">
    <div class="back-btn" onclick="goHome()">←</div>
    <div style="font-family: var(--font); font-size: 1rem; font-weight: 700;" id="arena-title">Level 1 – AI Customer</div>
    <div class="xp-pill" style="font-size:.75rem;" id="arena-moves">Move 0/6</div>
  </div>
  <div class="arena-chat" id="arena-chat"></div>
  <div class="arena-options" id="arena-options"></div>
</div>

<script>
// ============================================================
//  DATA & CONFIG
// ============================================================
const BUSINESS_PERSONAS = {
  printing: { customer: "business owner", product: "printing services", pain: "high printing costs and inconsistent quality", desire: "reliable, affordable printing partner" },
  medical_store: { customer: "medical store owner", product: "pharmaceutical products", pain: "stockouts and poor margins", desire: "reliable supply chain" },
  clinic: { customer: "patient / relative", product: "healthcare services", pain: "health concerns and confusing options", desire: "trusted doctor / treatment" },
  mobile_shop: { customer: "retail customer", product: "mobile & electronics", pain: "too many options, budget confusion", desire: "best value for money" },
  clothing: { customer: "shopper", product: "fashion & clothing", pain: "finding right fit and style", desire: "trendy and affordable clothes" },
  beauty: { customer: "lady customer", product: "beauty & salon services", pain: "finding a trusted beautician", desire: "look beautiful and feel confident" },
  real_estate: { customer: "home buyer", product: "property / plots", pain: "budget and location concerns", desire: "safe investment and dream home" },
  insurance: { customer: "family person", product: "insurance plans", pain: "fear of unexpected expenses", desire: "financial security for family" },
  software: { customer: "business client", product: "software solutions", pain: "manual work and productivity loss", desire: "automation and growth" },
  restaurant: { customer: "diner / food lover", product: "food & dining experience", pain: "finding quality food at right price", desire: "great taste and experience" },
  general: { customer: "prospect customer", product: "your product", pain: "current challenges", desire: "a better solution" }
};

const TOPICS = [
  {
    id: "greeting", icon: "👋", name: "Greeting by Name",
    sub: "First impression mastery",
    intro: "The first 7 seconds define the entire conversation. Greeting a customer by name builds instant trust and makes them feel special. Dale Carnegie in 'How to Win Friends' says a person's name is the sweetest sound to them.",
    tips: [
      { label: "Golden Rule", text: "Always use the customer's name + appropriate title (Sir/Ma'am) + time-based greeting (Good Morning/Afternoon). This three-step formula never fails." },
      { label: "Body Language", text: "Smile before you speak. Research shows smiling is heard over phone too. In person, maintain eye contact and lean slightly forward to show engagement." },
      { label: "WhatsApp Tip", text: "Start WhatsApp messages with: 'Hi [Name] Sir/Ma'am 🙏 Good [morning/afternoon/evening]! Hope you are doing well.' – Always personalize, never copy-paste generic greetings." }
    ],
    quote: { text: "You can make more friends in two months by becoming interested in other people than you can in two years trying to get people interested in you.", author: "Dale Carnegie – How to Win Friends and Influence People" },
    scenarios: [
      {
        text: "SCENARIO: You are about to call a customer whose name is PRASHANT. It is 10:00 AM Monday morning. You need to greet him professionally. Select the best reply:",
        options: [
          { text: "Hey Whatsapp buddy! How do you do bhai? 😂", correct: false, feedback: "Too casual and informal. Using 'WhatsApp buddy' sounds unprofessional. A sales greeting must be warm but professional with the customer's name." },
          { text: "Hi Sir, Good Morning! How are you today?", correct: false, feedback: "Good morning greeting is correct, but you MISSED using his name. Always use the customer's name – it creates instant personal connection as Dale Carnegie taught us." },
          { text: "Hi Prashant Sir, Good Morning! Hope you are doing great today 😊", correct: true, feedback: "" },
          { text: "Kaise ho Prashant bhai? Sab theek?", correct: false, feedback: "Very informal tone – no proper greeting, mixing Hindi casually. In professional sales, use formal greeting with time-based salutation even in Hindi markets." }
        ]
      },
      {
        text: "SCENARIO: A customer named SUNITA DEVI has walked into your shop at 3:30 PM. It is your first meeting. How do you greet her?",
        options: [
          { text: "Hello! What are you looking for today?", correct: false, feedback: "Jumping straight to business without a proper greeting feels transactional. Use her name and a time-based greeting first to build warmth." },
          { text: "Good Afternoon Sunita Ma'am! Welcome! So glad you're here today 😊", correct: true, feedback: "" },
          { text: "Namaste! Aao baitho.", correct: false, feedback: "Greeting is there but her name is not used, and 'Aao baitho' is too casual. Use name + formal time greeting for first meetings." },
          { text: "Hey! Nice to meet you!", correct: false, feedback: "Friendly but missing her name, missing time-based greeting, and lacks the professional warmth needed in B2C/B2B sales." }
        ]
      }
    ]
  },
  {
    id: "intro", icon: "🤝", name: "Self Introduction",
    sub: "Create a powerful first impression",
    intro: "Your self introduction is your personal brand pitch. Brian Tracy says you must clearly communicate WHO you are, WHAT you do, and HOW you HELP within 30 seconds. Make it memorable, confident, and customer-focused.",
    tips: [

let state = {
  userName: '', bizType: 'general', product: '',
  xp: 0, completedTopics: [], currentTopic: null,
  currentScenarioIdx: 0, currentLevel: 1,
  arenaHistory: [], arenaMove: 0, arenaWon: false
};

function saveState() { try { localStorage.setItem('sgState', JSON.stringify(state)); } catch(e){} }
function loadState() {
  try {
    const s = localStorage.getItem('sgState');
    if (s) { state = { ...state, ...JSON.parse(s) }; return true; }
  } catch(e){}
  return false;
}

// ============================================================
//  ONBOARDING
// ============================================================
function startApp() {
  const name = document.getElementById('inp-name').value.trim();
  const biz = document.getElementById('inp-biz').value;
  const prod = document.getElementById('inp-product').value.trim();
  if (!name) { alert('Please enter your name to continue.'); return; }
  if (!biz) { alert('Please select your business type.'); return; }
  state.userName = name;
  state.bizType = biz;
  state.product = prod || BUSINESS_PERSONAS[biz].product;
  saveState();
  showHome();
}

// ============================================================
//  HOME
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function showHome() {
  showScreen('home');
  const h = new Date().getHours();
  const greet = h < 12 ? 'Good morning,' : h < 17 ? 'Good afternoon,' : 'Good evening,';
  document.getElementById('greeting-text').textContent = greet;
  document.getElementById('user-display').textContent = state.userName || 'Champion';
  document.getElementById('xp-count').textContent = state.xp;

  const pct = Math.round((state.completedTopics.length / TOPICS.length) * 100);
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';

  // Streak dots
  const sb = document.getElementById('streak-bar');
  sb.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = document.createElement('div');
    d.className = 'streak-dot' + (i < (state.completedTopics.length % 8) ? ' on' : '');
    sb.appendChild(d);
  }

  // Topics grid
  const tg = document.getElementById('topics-grid');
  tg.innerHTML = '';
  TOPICS.forEach((t, i) => {
    const done = state.completedTopics.includes(t.id);
    const locked = i > 0 && !state.completedTopics.includes(TOPICS[i-1].id);
    const div = document.createElement('div');
    div.className = 'topic-card ' + (done ? 'completed' : locked ? 'locked' : 'active-topic');
    div.onclick = () => openTopic(t);
    div.innerHTML = `
      <div class="topic-icon">${t.icon}</div>
      <div class="topic-info">
        <div class="topic-name">${t.name}</div>
        <div class="topic-sub">${t.sub}</div>
      </div>
      <div class="topic-badge ${done ? 'badge-done' : locked ? 'badge-lock' : 'badge-go'}">${done ? '✓ Done' : locked ? '🔒 Locked' : '▶ Go'}</div>
    `;
    tg.appendChild(div);
  });

  // Level grid
  const lg = document.getElementById('level-grid');
  lg.innerHTML = '';
  for (let i = 1; i <= 5; i++) {
    const unlocked = state.completedTopics.length >= (i - 1) * 2;
    const div = document.createElement('div');
    div.className = 'level-btn ' + (unlocked ? 'active-lv' : 'locked-lv');
    div.innerHTML = `<div class="lv-num">${i}</div><div>Level</div>`;
    div.onclick = () => openArena(i);
    lg.appendChild(div);
  }
}

function goHome() { showHome(); }

function openTopic(topic) {
  state.currentTopic = topic;
  state.currentScenarioIdx = 0;
  document.getElementById('learn-title').textContent = topic.icon + ' ' + topic.name;
  const body = document.getElementById('learn-body');
  const persona = BUSINESS_PERSONAS[state.bizType] || BUSINESS_PERSONAS.general;

  let html = `
    <div class="learn-icon">${topic.icon}</div>
    <h2 class="learn-heading">${topic.name}</h2>
    <p class="learn-intro">${topic.intro}</p>
  `;

  topic.tips.forEach(tip => {
    html += `<div class="tip-card"><div class="tip-label">💡 ${tip.label}</div><p>${tip.text}</p></div>`;
  });

  html += `<div class="author-quote"><p>${topic.quote.text}</p><div class="author-name">— ${topic.quote.author}</div></div>`;

  if (topic.dynamicScenario) {
    html += `<div class="tip-card" style="border-color: var(--accent2)">
      <div class="tip-label" style="color:var(--accent2);">⚙️ Your Business Context</div>
      <p>Since you run a <strong>${persona.customer}-focused ${state.bizType.replace('_', ' ')} business</strong> selling <strong>${state.product}</strong>, your SPIN situations involve ${persona.pain} and ${persona.desire}. Practice sections use your actual customer type!</p>
    </div>`;
  }

  html += `<button class="practice-cta" onclick="openPractice()">⚡ Start Practice Scenarios</button>`;
  html += `<div style="height:2rem;"></div>`;

  body.innerHTML = html;
  showScreen('learn');
}

function goLearn() {
  if (state.currentTopic) openTopic(state.currentTopic);
}

//  PRACTICE SCREEN

function openPractice() {
  const topic = state.currentTopic;
  if (!topic) return;
  document.getElementById('practice-title').textContent = '⚡ ' + topic.name;
  state.currentScenarioIdx = 0;
  renderScenario();
  showScreen('practice');
}

function renderScenario() {
  const topic = state.currentTopic;
  const persona = BUSINESS_PERSONAS[state.bizType] || BUSINESS_PERSONAS.general;

  let scenarios = topic.scenarios;
  if (topic.dynamicScenario || scenarios.length === 0) {
    scenarios = generateDynamicScenarios(topic, persona);
  }

  if (state.currentScenarioIdx >= scenarios.length) {
    showCompletionScreen();
    return;
  }

  const sc = scenarios[state.currentScenarioIdx];
  const body = document.getElementById('practice-body');
  const letters = ['A', 'B', 'C', 'D'];

  let html = `
    <div style="font-size:.75rem;color:var(--muted);margin-bottom:.8rem;">
      Scenario ${state.currentScenarioIdx + 1} of ${scenarios.length}
    </div>
    <div class="scenario-box">
      <div class="scenario-label">📋 SCENARIO</div>
      <div class="scenario-text">${sc.text}</div>
    </div>
    <div class="options-list" id="options-list">
  `;

  sc.options.forEach((opt, i) => {
    html += `
      <button class="option-btn" id="opt-${i}" onclick="selectOption(${i})">
        <div class="opt-letter">${letters[i]}</div>
        <div>${opt.text}</div>
      </button>
    `;
  });

  html += `</div>
    <div class="feedback-box" id="feedback-box">
      <div class="fb-title" id="fb-title"></div>
      <div class="fb-text" id="fb-text"></div>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextScenario()">✅ Next Scenario →</button>
    <button class="retry-btn" id="retry-btn" onclick="retryScenario()">🔄 Try Again</button>
    <div style="height:2rem;"></div>
  `;

  body.innerHTML = html;
  body.scrollTop = 0;
}

function selectOption(idx) {
  const topic = state.currentTopic;
  const persona = BUSINESS_PERSONAS[state.bizType] || BUSINESS_PERSONAS.general;
  let scenarios = topic.scenarios;
  if (topic.dynamicScenario || scenarios.length === 0) scenarios = generateDynamicScenarios(topic, persona);

  const sc = scenarios[state.currentScenarioIdx];
  const opt = sc.options[idx];

  document.querySelectorAll('.option-btn').forEach(b => b.style.pointerEvents = 'none');

  const btn = document.getElementById('opt-' + idx);
  const fb = document.getElementById('feedback-box');
  const fbTitle = document.getElementById('fb-title');
  const fbText = document.getElementById('fb-text');

  if (opt.correct) {
    btn.classList.add('correct');
    fb.className = 'feedback-box show fb-correct';
    fbTitle.textContent = '✅ Excellent Choice!';
    fbText.textContent = 'That is the correct approach! You demonstrated the right technique. Well done!';
    document.getElementById('next-btn').classList.add('show');
    state.xp += 50;
    document.getElementById('xp-count').textContent = state.xp;
    triggerConfetti();
  } else {
    btn.classList.add('wrong');
    fb.className = 'feedback-box show fb-wrong';
    fbTitle.textContent = '❌ Not Quite Right';
    fbText.textContent = opt.feedback;
    document.getElementById('retry-btn').classList.add('show');
  }

  fb.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  saveState();
}

function nextScenario() {
  state.currentScenarioIdx++;
  const topic = state.currentTopic;
  const persona = BUSINESS_PERSONAS[state.bizType] || BUSINESS_PERSONAS.general;
  let scenarios = topic.scenarios;
  if (topic.dynamicScenario || scenarios.length === 0) scenarios = generateDynamicScenarios(topic, persona);

  if (state.currentScenarioIdx >= scenarios.length) {
    showCompletionScreen();
  } else {
    renderScenario();
  }
}

function retryScenario() { renderScenario(); }

function showCompletionScreen() {
  const topic = state.currentTopic;
  if (!state.completedTopics.includes(topic.id)) {
    state.completedTopics.push(topic.id);
    state.xp += 200;
  }
  saveState();

  const body = document.getElementById('practice-body');
  body.innerHTML = `
    <div style="text-align:center;padding:2rem 1rem;">
      <div style="font-size:4rem;margin-bottom:1rem;">🏆</div>
      <h2 style="font-family:var(--font);font-size:1.5rem;color:var(--success);margin-bottom:.5rem;">Topic Mastered!</h2>
      <p style="color:var(--muted);font-size:.9rem;line-height:1.6;margin-bottom:1.5rem;">You've completed <strong>${topic.name}</strong>.<br>+200 XP earned! Keep going!</p>
      <button class="practice-cta" onclick="goHome()">🏠 Back to Dashboard</button>
    </div>
  `;
  triggerConfetti();
}

// ============================================================
//  DYNAMIC SCENARIO GENERATOR
// ============================================================
function generateDynamicScenarios(topic, persona) {
  if (topic.id === 'spin_situation') {
    return [{
      text: `SCENARIO: You are speaking to a ${persona.customer} who runs a business in Lucknow. Your goal is to ask SPIN Situation questions about their current ${state.product || persona.product} usage. Select the BEST opening situation question:`,
      options: [
        { text: `What ${state.product || persona.product} solutions are you currently using in your business?`, correct: true, feedback: '' },
        { text: `Would you like to buy our ${state.product || persona.product}? We have great offers!`, correct: false, feedback: 'This is a direct sales pitch, NOT a Situation question. SPIN starts with understanding, not selling. Ask about their current situation first.' },
        { text: `Don't you think your current solution has problems?`, correct: false, feedback: 'This is a leading/problem question and you haven\'t even gathered situation data yet. Follow the SPIN sequence: Situation first.' },
        { text: `How many staff members do you have and what is your monthly turnover?`, correct: false, feedback: 'Too intrusive as an opener. Starting with financial/HR questions feels like an interrogation, not a conversation. Start with the product/service situation.' }
      ]
    },
    {
      text: `SCENARIO: Your ${persona.customer} customer has answered your first situation question and told you they currently use a local supplier. What is the best FOLLOW-UP situation question?`,
      options: [
        { text: `How long have you been working with them and how often do you reorder?`, correct: true, feedback: '' },
        { text: `Is your current supplier bad? Because ours is much better.`, correct: false, feedback: 'Never compare or attack the competitor this early. First gather all situation facts, then subtly uncover problems through Problem questions.' },
        { text: `Okay, so you don't need us then.`, correct: false, feedback: 'Completely wrong! A current supplier means there is an existing market – it does NOT mean no opportunity. Explore their situation further.' },
        { text: `How much discount will you give if you switch to us?`, correct: false, feedback: 'Jumping to pricing and switching before establishing any need or rapport. This is backwards. Situation → Problem → Implication → Need first.' }
      ]
    }];
  }

  if (topic.id === 'spin_problem') {
    return [{
      text: `SCENARIO: Your ${persona.customer} uses a current supplier. You want to ask a SPIN Problem question to uncover dissatisfaction. Which question is best?`,
      options: [
        { text: `Have you ever faced delays or quality issues with your current supplier that affected your business?`, correct: true, feedback: '' },
        { text: `Your current supplier must be terrible right? Ours is much better.`, correct: false, feedback: 'Never attack the competitor. Problem questions must let the CUSTOMER discover and state the problem themselves. Leading questions feel manipulative.' },
        { text: `Do you want to buy our product?`, correct: false, feedback: 'Still a sales push, not a SPIN Problem question. You haven\'t established any problem yet. The customer won\'t feel the need to switch.' },
        { text: `Everything is going fine with your supplier, right?`, correct: false, feedback: 'This is a closed positive question that reinforces satisfaction. A Problem question should explore potential dissatisfactions and challenges.' }
      ]
    }];
  }

  return topic.scenarios.length > 0 ? topic.scenarios : [{
    text: `SCENARIO: You are speaking to a ${persona.customer} about your ${state.product || persona.product}. Apply the ${topic.name} technique. Select the BEST response:`,
    options: [
      { text: `Apply the correct ${topic.name} technique confidently and professionally.`, correct: true, feedback: '' },
      { text: `Rush into selling without applying the technique.`, correct: false, feedback: `Take time to properly apply ${topic.name} before moving forward.` },
      { text: `Use an informal approach that skips the technique entirely.`, correct: false, feedback: `The ${topic.name} technique exists for a reason – skipping it reduces your conversion rate significantly.` },
      { text: `Use an aggressive approach that pressures the customer.`, correct: false, feedback: `Pressure tactics damage trust. Always use professional, value-based techniques.` }
    ]
  }];
}

// ============================================================
//  AI ARENA
// ============================================================
const ARENA_FLOWS = {
  1: {
    aiMessages: [
      (p) => `Hi, I saw your message. Tell me more about what you offer.`,
      (p) => `Okay, so what exactly do you do for businesses like mine?`,
      (p) => `That sounds interesting. But why should I choose you over others?`,
      (p) => `I've had bad experiences with suppliers before. How are you different?`,
      (p) => `What would it cost me roughly?`,
      (p) => `Let me think about it...`
    ],
    playerOptions: [
      [
        { text: `Hi ${''} Sir! I help businesses like yours save time and money on [product]. Do you have 2 minutes to explore this?`, score: 10 },
        { text: `I sell stuff. Interested?`, score: -5 },
        { text: `Check out our website for all details.`, score: 0 }
      ],
      [
        { text: `Great question! We specialize in [product/service] that specifically solves [pain point] for businesses in your industry. May I ask – what challenges are you currently facing?`, score: 10 },
        { text: `We do everything. We are the best company.`, score: -5 },
        { text: `We have been in business since 2010...`, score: 2 }
      ],
      [
        { text: `Excellent question! 3 reasons: We have helped 50+ similar businesses, we guarantee quality, and we offer free support. But more importantly – what specific outcome matters most to YOU?`, score: 10 },
        { text: `Because we are cheap!`, score: -5 },
        { text: `I don't know, you decide.`, score: -10 }
      ],
      [
        { text: `I completely understand that concern and I respect it. Could you tell me what specifically went wrong? I want to make sure we have the right solution – not just make a sale.`, score: 10 },
        { text: `Our company never makes mistakes, 100% guarantee!`, score: -5 },
        { text: `That was their fault, not ours.`, score: 0 }
      ],
      [
        { text: `Based on what you've shared, I'd estimate [range]. But to give you an exact quote that fits your needs, may I ask about your typical volume per month?`, score: 10 },
        { text: `Very cheap, whatever you want to pay!`, score: -5 },
        { text: `I'll send you a price list.`, score: 2 }
      ],
      [
        { text: `Of course Sir, take your time! Just so you have all the facts – this current pricing is valid till end of month. Shall I block a slot for you tentatively while you decide?`, score: 15 },
        { text: `Please decide fast! Last chance!`, score: -10 },
        { text: `Okay, call me when ready.`, score: -5 }
      ]
    ],
    winThreshold: 40
  }
};

let arenaScore = 0;
let arenaLevel = 1;
let arenaCurrentMove = 0;
let arenaMessages = [];

function openArena(level) {
  arenaLevel = level;
  arenaScore = 0;
  arenaCurrentMove = 0;
  arenaMessages = [];
  arenaWon = false;

  const lvData = LEVEL_SCENARIOS[level];
  document.getElementById('arena-title').textContent = lvData.title;
  document.getElementById('arena-moves').textContent = `Move 0/${lvData.moves}`;

  const chat = document.getElementById('arena-chat');
  chat.innerHTML = '';
  document.getElementById('arena-options').innerHTML = '';

  showScreen('arena');
  addArenaMessage('ai', `👋 Hi! I'm ${lvData.customerName}. ${lvData.description.replace('A prospect', 'You reached out to me')}`);

  setTimeout(() => showArenaOptions(), 800);
}

function addArenaMessage(type, text) {
  const chat = document.getElementById('arena-chat');
  const d = document.createElement('div');
  d.className = 'msg ' + type;
  d.innerHTML = `<div class="msg-label">${type === 'ai' ? '🤖 AI Customer' : '👤 You'}</div><div class="msg-bubble">${text}</div>`;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
  arenaMessages.push({ type, text });
}

function showArenaOptions() {
  const lvData = LEVEL_SCENARIOS[arenaLevel];
  const flow = ARENA_FLOWS[1]; // Use flow 1 for all levels with persona adaptation
  const optsList = document.getElementById('arena-options');
  optsList.innerHTML = '';

  if (arenaCurrentMove >= flow.aiMessages.length) {
    checkArenaWin();
    return;
  }

  // Show AI message first
  const aiMsg = flow.aiMessages[arenaCurrentMove]();
  addArenaMessage('ai', aiMsg);

  // Show typing then options
  setTimeout(() => {
    const opts = flow.playerOptions[arenaCurrentMove];
    opts.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'arena-opt';
      btn.textContent = opt.text.replace('[product/service]', state.product || 'our service').replace('[product]', state.product || 'our service').replace('[pain point]', BUSINESS_PERSONAS[state.bizType].pain).replace('${''}', lvData.customerName);
      btn.onclick = () => selectArenaOption(opt, btn);
      optsList.appendChild(btn);
    });
  }, 500);
}

function selectArenaOption(opt, btn) {
  document.querySelectorAll('.arena-opt').forEach(b => b.style.pointerEvents = 'none');
  document.getElementById('arena-options').innerHTML = '';

  const displayText = btn.textContent;
  addArenaMessage('user', displayText);
  arenaScore += opt.score;
  arenaCurrentMove++;

  const lvData = LEVEL_SCENARIOS[arenaLevel];
  document.getElementById('arena-moves').textContent = `Move ${arenaCurrentMove}/${lvData.moves}`;

  // Show reaction
  let reaction = '';
  if (opt.score >= 10) reaction = '✅ *nods* Interesting point...';
  else if (opt.score > 0) reaction = 'Hmm, okay...';
  else if (opt.score < 0) reaction = '😕 That doesn\'t quite answer my concern...';

  if (reaction) {
    setTimeout(() => {
      addArenaMessage('ai', reaction);
      setTimeout(() => {
        if (arenaCurrentMove >= ARENA_FLOWS[1].aiMessages.length) {
          checkArenaWin();
        } else {
          showArenaOptions();
        }
      }, 700);
    }, 400);
  } else {
    setTimeout(() => {
      if (arenaCurrentMove >= ARENA_FLOWS[1].aiMessages.length) {
        checkArenaWin();
      } else {
        showArenaOptions();
      }
    }, 600);
  }
}

function checkArenaWin() {
  const chat = document.getElementById('arena-chat');
  document.getElementById('arena-options').innerHTML = '';

  const threshold = ARENA_FLOWS[1].winThreshold;
  if (arenaScore >= threshold) {
    addArenaMessage('ai', `🎉 You know what? You've convinced me. Let's go ahead with it. When can you start?`);
    setTimeout(() => {
      const win = document.createElement('div');
      win.className = 'win-banner';
      win.innerHTML = `
        <div class="win-icon">🏆</div>
        <h2>You Won the Sale!</h2>
        <p>Score: ${arenaScore} / ${threshold}+ needed<br>The AI customer agreed to buy! +500 XP earned!</p>
        <button class="practice-cta" style="margin-top:1rem;max-width:280px;" onclick="goHome()">Back to Dashboard</button>
      `;
      chat.appendChild(win);
      chat.scrollTop = chat.scrollHeight;
      state.xp += 500;
      saveState();
      triggerConfetti();
    }, 1200);
  } else {
    addArenaMessage('ai', `I'm not fully convinced yet. Let me think... (Score: ${arenaScore}/${threshold} needed to close)`);
    setTimeout(() => {
      const retry = document.createElement('button');
      retry.className = 'practice-cta';
      retry.style.cssText = 'margin: 1rem; width: calc(100% - 2rem);';
      retry.textContent = '🔄 Try Again';
      retry.onclick = () => openArena(arenaLevel);
      chat.appendChild(retry);
      chat.scrollTop = chat.scrollHeight;
    }, 800);
  }
}

// ============================================================
//  CONFETTI
// ============================================================
function triggerConfetti() {
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const particles = Array.from({length: 80}, () => ({
    x: Math.random() * canvas.width,
    y: -10,
    r: Math.random() * 8 + 4,
    d: Math.random() * 80 + 20,
    color: ['#f5a623','#4f8ef7','#3ecf8e','#f55a5a','#fff'][Math.floor(Math.random()*5)],
    tilt: Math.random() * 10 - 5,
    tiltAngle: 0,
    tiltSpeed: Math.random() * 0.1 + 0.05
  }));
  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.tiltAngle += p.tiltSpeed;
      p.y += 3 + Math.sin(frame * 0.01 + p.d) * 1.5;
      p.tilt = Math.sin(p.tiltAngle) * 15;
      ctx.beginPath();
      ctx.ellipse(p.x + p.tilt, p.y, p.r, p.r * 0.5, p.tiltAngle, 0, 2 * Math.PI);
      ctx.fillStyle = p.color;
      ctx.fill();
    });
    frame++;
    if (frame < 120) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  draw();
}
