<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SalesGuru AI</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f1a; --surface: #161928; --card: #1e2235; --border: #2a2f4a;
  --accent: #f5a623; --accent2: #4f8ef7; --success: #3ecf8e; --danger: #f55a5a;
  --text: #f0f2ff; --muted: #8890b0; --radius: 14px;
  --font: 'Sora', sans-serif; --body: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: var(--body); min-height: 100vh; overflow-x: hidden; }
h1,h2,h3 { font-family: var(--font); }

/* SCREENS - only one visible at a time via JS */
.screen { display: none; min-height: 100vh; flex-direction: column; }

/* ONBOARDING */
#screen-onboard {
  background: linear-gradient(160deg, #0d0f1a 0%, #1a1035 100%);
  align-items: center; justify-content: center; padding: 2rem 1.5rem; text-align: center;
}
.logo-badge { font-size: 3.5rem; margin-bottom: 1rem; }
.onboard-title { font-size: 2rem; font-weight: 700; color: var(--accent); margin-bottom: .5rem; }
.onboard-sub { color: var(--muted); font-size: .95rem; line-height: 1.6; margin-bottom: 2rem; }
.form-group { width: 100%; max-width: 380px; margin-bottom: 1rem; }
.form-group label { display: block; font-size: .8rem; color: var(--muted); margin-bottom: .4rem; text-align: left; letter-spacing: .05em; text-transform: uppercase; }
.form-group input, .form-group select {
  width: 100%; padding: .85rem 1rem; background: var(--card);
  border: 1.5px solid var(--border); border-radius: 10px; color: var(--text);
  font-family: var(--body); font-size: .95rem; outline: none;
}
.form-group select option { background: var(--card); color: var(--text); }
.btn-start {
  width: 100%; max-width: 380px; padding: 1rem; background: var(--accent);
  color: #0d0f1a; font-family: var(--font); font-weight: 700; font-size: 1rem;
  border: none; border-radius: 10px; cursor: pointer; margin-top: .5rem;
}

/* HOME */
#screen-home { padding: 0; }
.top-bar {
  background: var(--surface); padding: 1.2rem 1.3rem .9rem;
  border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
}
.top-bar .greeting { font-size: .8rem; color: var(--muted); }
.top-bar .username { font-family: var(--font); font-size: 1.1rem; font-weight: 700; color: var(--accent); }
.xp-pill {
  background: var(--card); border: 1.5px solid var(--border); border-radius: 20px;
  padding: .35rem .8rem; font-size: .8rem; font-weight: 600; display: flex; align-items: center; gap: 6px;
}
.xp-pill .xpval { color: var(--accent); font-family: var(--font); }
.scroll-body { flex: 1; overflow-y: auto; padding: 1.2rem; }
.section-title { font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .8rem; margin-top: 1.4rem; }
.section-title:first-child { margin-top: 0; }
.progress-banner {
  background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius);
  padding: 1rem 1.2rem; margin-bottom: 1rem;
}
.pb-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: .6rem; }
.pb-label { font-family: var(--font); font-size: .9rem; font-weight: 600; }
.pb-pct { font-size: .8rem; color: var(--accent); font-weight: 600; }
.prog-bar { background: var(--border); border-radius: 20px; height: 7px; overflow: hidden; }
.prog-fill { background: linear-gradient(90deg, var(--accent2), var(--accent)); height: 100%; border-radius: 20px; transition: width .5s; }
.streak-bar { display: flex; gap: .4rem; margin-bottom: .6rem; }
.streak-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); }
.streak-dot.on { background: var(--accent); }
.topics-grid { display: flex; flex-direction: column; gap: .7rem; }
.topic-card {
  background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius);
  padding: 1rem 1.1rem; display: flex; align-items: center; gap: .9rem; cursor: pointer;
}
.topic-card.completed { border-color: var(--success); }
.topic-card.locked { opacity: .4; pointer-events: none; }
.topic-card.active-topic { border-color: var(--accent); }
.topic-icon { font-size: 1.6rem; min-width: 2.2rem; text-align: center; }
.topic-info { flex: 1; }
.topic-name { font-family: var(--font); font-size: .9rem; font-weight: 600; }
.topic-sub { font-size: .75rem; color: var(--muted); margin-top: 2px; }
.topic-badge { font-size: .7rem; padding: .25rem .6rem; border-radius: 20px; font-weight: 600; white-space: nowrap; }
.badge-done { background: rgba(62,207,142,.15); color: var(--success); }
.badge-go { background: rgba(245,166,35,.15); color: var(--accent); }
.badge-lock { background: rgba(136,144,176,.1); color: var(--muted); }
.level-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: .5rem; }
.level-btn {
  background: var(--card); border: 1.5px solid var(--border); border-radius: 10px;
  padding: .7rem .3rem; text-align: center; cursor: pointer;
  font-family: var(--font); font-size: .75rem; font-weight: 600;
}
.level-btn .lv-num { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
.level-btn.locked-lv { opacity: .4; pointer-events: none; }
.level-btn.active-lv { border-color: var(--accent2); }

/* LEARN */
#screen-learn { padding: 0; }
.learn-header {
  background: var(--surface); padding: 1rem 1.2rem;
  border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: .8rem;
}
.back-btn {
  background: var(--card); border: 1.5px solid var(--border); border-radius: 8px;
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 1rem; flex-shrink: 0;
}
.learn-title-text { font-family: var(--font); font-size: 1rem; font-weight: 700; }
.learn-body { flex: 1; overflow-y: auto; padding: 1.3rem; }
.learn-icon { font-size: 3rem; text-align: center; margin-bottom: 1rem; }
.learn-heading { font-family: var(--font); font-size: 1.4rem; font-weight: 700; margin-bottom: .5rem; }
.learn-intro { color: var(--muted); font-size: .9rem; line-height: 1.65; margin-bottom: 1.4rem; }
.tip-card {
  background: var(--card); border-left: 3px solid var(--accent); border-radius: 10px;
  padding: 1rem 1.1rem; margin-bottom: .8rem;
}
.tip-label { font-size: .7rem; text-transform: uppercase; color: var(--accent); font-weight: 700; margin-bottom: .3rem; letter-spacing: .06em; }
.tip-card p { font-size: .88rem; line-height: 1.6; }
.author-quote {
  background: rgba(79,142,247,.08); border: 1.5px solid rgba(79,142,247,.2);
  border-radius: 10px; padding: 1rem 1.1rem; margin-bottom: 1.4rem;
}
.author-quote p { font-size: .88rem; line-height: 1.6; font-style: italic; margin-bottom: .4rem; }
.author-name { font-size: .75rem; color: var(--accent2); font-weight: 600; }
.practice-cta {
  background: var(--accent); color: #0d0f1a; font-family: var(--font); font-weight: 700;
  font-size: 1rem; border: none; border-radius: 12px; padding: 1rem; width: 100%;
  cursor: pointer; margin-top: 1rem; display: block;
}

/* PRACTICE */
#screen-practice { padding: 0; }
.practice-body { flex: 1; overflow-y: auto; padding: 1.3rem; }
.scenario-box {
  background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius);
  padding: 1.2rem; margin-bottom: 1.2rem;
}
.scenario-label { font-size: .7rem; text-transform: uppercase; color: var(--accent2); font-weight: 700; letter-spacing: .08em; margin-bottom: .5rem; }
.scenario-text { font-size: .92rem; line-height: 1.6; font-weight: 500; }
.options-list { display: flex; flex-direction: column; gap: .7rem; margin-bottom: 1.2rem; }
.option-btn {
  background: var(--card); border: 1.5px solid var(--border); border-radius: 12px;
  padding: .95rem 1.1rem; text-align: left; cursor: pointer;
  font-family: var(--body); font-size: .88rem; line-height: 1.5; color: var(--text);
  display: flex; align-items: flex-start; gap: .7rem; width: 100%;
}
.opt-letter {
  background: var(--border); border-radius: 6px; min-width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center; font-weight: 700;
  font-size: .75rem; font-family: var(--font); flex-shrink: 0; margin-top: 1px;
}
.option-btn.correct { border-color: var(--success); background: rgba(62,207,142,.07); }
.option-btn.correct .opt-letter { background: var(--success); color: #0d0f1a; }
.option-btn.wrong { border-color: var(--danger); background: rgba(245,90,90,.07); }
.option-btn.wrong .opt-letter { background: var(--danger); color: #fff; }
.feedback-box { border-radius: 12px; padding: 1rem 1.1rem; margin-bottom: 1rem; }
.fb-wrong { background: rgba(245,90,90,.1); border: 1.5px solid rgba(245,90,90,.3); }
.fb-correct { background: rgba(62,207,142,.1); border: 1.5px solid rgba(62,207,142,.3); }
.fb-title { font-family: var(--font); font-size: .85rem; font-weight: 700; margin-bottom: .4rem; }
.fb-wrong .fb-title { color: var(--danger); }
.fb-correct .fb-title { color: var(--success); }
.fb-text { font-size: .83rem; line-height: 1.6; color: var(--muted); }
.action-btn {
  border-radius: 12px; padding: .95rem; width: 100%; cursor: pointer;
  font-family: var(--font); font-weight: 700; font-size: .95rem; border: none; margin-top: .5rem; display: block;
}
.btn-next { background: var(--success); color: #0d0f1a; }
.btn-retry { background: transparent; color: var(--accent); border: 1.5px solid var(--accent) !important; }

/* ARENA */
#screen-arena { padding: 0; }
.arena-header {
  background: var(--surface); padding: 1rem 1.2rem;
  border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;
}
.arena-chat { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: .8rem; }
.msg { max-width: 85%; }
.msg.ai { align-self: flex-start; }
.msg.user { align-self: flex-end; }
.msg-bubble { padding: .85rem 1rem; border-radius: 16px; font-size: .88rem; line-height: 1.6; }
.msg.ai .msg-bubble { background: var(--card); border: 1.5px solid var(--border); border-bottom-left-radius: 4px; }
.msg.user .msg-bubble { background: var(--accent2); color: #fff; border-bottom-right-radius: 4px; }
.msg-label { font-size: .68rem; color: var(--muted); margin-bottom: 3px; font-weight: 600; }
.msg.user .msg-label { text-align: right; }
.arena-options { padding: .8rem 1rem 1.2rem; display: flex; flex-direction: column; gap: .5rem; background: var(--surface); border-top: 1px solid var(--border); }
.arena-opt {
  background: var(--card); border: 1.5px solid var(--border); border-radius: 10px;
  padding: .75rem .9rem; font-size: .85rem; cursor: pointer; text-align: left;
  color: var(--text); font-family: var(--body);
}
.win-banner {
  background: linear-gradient(135deg, #1a3a1a, #0d1f0d); border: 2px solid var(--success);
  border-radius: var(--radius); padding: 1.5rem; text-align: center; margin: 1rem;
}
.win-icon { font-size: 3rem; margin-bottom: .5rem; }
</style>
</head>
<body>

<!-- ===== ONBOARDING ===== -->
<div id="screen-onboard" class="screen">
  <div class="logo-badge">🏆</div>
  <h1 class="onboard-title">SalesGuru AI</h1>
  <p class="onboard-sub">Master the world's best sales techniques.<br>Learn. Practice. Close deals.</p>
  <div class="form-group">
    <label>Your Name</label>
    <input id="inp-name" type="text" placeholder="e.g. Rahul Sharma">
  </div>
  <div class="form-group">
    <label>Your Business Type</label>
    <select id="inp-biz">
      <option value="">-- Select your business --</option>
      <option value="printing">Printing Company</option>
      <option value="medical_store">Medical / Pharmacy Store</option>
      <option value="clinic">Clinic / Healthcare</option>
      <option value="mobile_shop">Mobile / Electronics Shop</option>
      <option value="clothing">Clothing / Fashion Store</option>
      <option value="beauty">Beauty Parlour / Salon</option>
      <option value="real_estate">Real Estate</option>
      <option value="insurance">Insurance</option>
      <option value="software">Software / IT Services</option>
      <option value="restaurant">Restaurant / Food Business</option>
      <option value="general">General Sales</option>
    </select>
  </div>
  <div class="form-group">
    <label>Your Product / Service (optional)</label>
    <input id="inp-product" type="text" placeholder="e.g. Business Cards, Flex Printing">
  </div>
  <button class="btn-start" id="btn-start">Start Training 🚀</button>
</div>

<!-- ===== HOME ===== -->
<div id="screen-home" class="screen">
  <div class="top-bar">
    <div>
      <div class="greeting" id="greeting-text">Good morning,</div>
      <div class="username" id="user-display">Champion</div>
    </div>
    <div class="xp-pill">⚡ XP <span class="xpval" id="xp-count">0</span></div>
  </div>
  <div class="scroll-body">
    <div class="progress-banner">
      <div class="pb-top"><span class="pb-label">Overall Progress</span><span class="pb-pct" id="prog-pct">0%</span></div>
      <div class="streak-bar" id="streak-bar"></div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="section-title">📚 Sales Topics</div>
    <div class="topics-grid" id="topics-grid"></div>
    <div class="section-title">⚔️ Level Arena – Practice With AI Customer</div>
    <div class="level-grid" id="level-grid"></div>
    <div style="height:2rem"></div>
  </div>
</div>

<!-- ===== LEARN ===== -->
<div id="screen-learn" class="screen">
  <div class="learn-header">
    <div class="back-btn" id="back-from-learn">←</div>
    <div class="learn-title-text" id="learn-title">Topic</div>
  </div>
  <div class="learn-body" id="learn-body"></div>
</div>

<!-- ===== PRACTICE ===== -->
<div id="screen-practice" class="screen">
  <div class="learn-header">
    <div class="back-btn" id="back-from-practice">←</div>
    <div class="learn-title-text" id="practice-title">Practice</div>
  </div>
  <div class="practice-body" id="practice-body"></div>
</div>

<!-- ===== ARENA ===== -->
<div id="screen-arena" class="screen">
  <div class="arena-header">
    <div class="back-btn" id="back-from-arena">←</div>
    <div style="font-family:var(--font);font-size:1rem;font-weight:700" id="arena-title">Arena</div>
    <div class="xp-pill" style="font-size:.75rem" id="arena-moves">Move 0/6</div>
  </div>
  <div class="arena-chat" id="arena-chat"></div>
  <div class="arena-options" id="arena-options"></div>
</div>

// DATA

  printing:      { customer:"business owner",    product:"printing services",       pain:"high printing costs",          desire:"reliable affordable printing" },

      {
        text:"SCENARIO: You are about to call a customer whose name is PRASHANT. It is 10:00 AM Monday morning. Select the best greeting:",

var APP = {
  userName: '', bizType: 'general', product: '',
  xp: 0, completedTopics: [],
  currentTopicId: null, currentScenarioIdx: 0
};

function save() {
  try { localStorage.setItem('sg2', JSON.stringify(APP)); } catch(e) {}
}
function load() {
  try {
    var s = localStorage.getItem('sg2');
    if (s) {
      var d = JSON.parse(s);
      APP.userName = d.userName || '';
      APP.bizType = d.bizType || 'general';
      APP.product = d.product || '';
      APP.xp = d.xp || 0;
      APP.completedTopics = Array.isArray(d.completedTopics) ? d.completedTopics : [];
      APP.currentTopicId = d.currentTopicId || null;
      return !!(APP.userName);
    }
  } catch(e) {}
  return false;
}
function getTopic(id) {
  for (var i = 0; i < TOPICS.length; i++) { if (TOPICS[i].id === id) return TOPICS[i]; }
  return null;
}

// ============================================================
// SCREEN SWITCHING
// ============================================================
function show(screenId) {
  var screens = ['onboard','home','learn','practice','arena'];
  for (var i = 0; i < screens.length; i++) {
    var el = document.getElementById('screen-' + screens[i]);
    if (el) el.style.display = 'none';
  }
  var target = document.getElementById('screen-' + screenId);
  if (target) target.style.display = 'flex';
}

// ============================================================
// ONBOARDING
// ============================================================
document.getElementById('btn-start').addEventListener('click', function() {
  var name = document.getElementById('inp-name').value.trim();
  var biz  = document.getElementById('inp-biz').value;
  var prod = document.getElementById('inp-product').value.trim();
  if (!name) { alert('Please enter your name.'); return; }
  if (!biz)  { alert('Please select your business type.'); return; }
  APP.userName = name;
  APP.bizType  = biz;
  APP.product  = prod || (PERSONAS[biz] ? PERSONAS[biz].product : 'your product');
  APP.xp = 0;
  APP.completedTopics = [];
  save();
  renderHome();
  show('home');
});

// ============================================================
// HOME
// ============================================================
function renderHome() {
  var h = new Date().getHours();
  var greet = h < 12 ? 'Good morning,' : h < 17 ? 'Good afternoon,' : 'Good evening,';
  document.getElementById('greeting-text').textContent = greet;
  document.getElementById('user-display').textContent = APP.userName;
  document.getElementById('xp-count').textContent = APP.xp;

  var done = APP.completedTopics.length;
  var pct = Math.round(done / TOPICS.length * 100);
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';

  // Streak dots
  var sb = document.getElementById('streak-bar');
  sb.innerHTML = '';
  for (var i = 0; i < 7; i++) {
    var d = document.createElement('div');
    d.className = 'streak-dot' + (i < done % 8 ? ' on' : '');
    sb.appendChild(d);
  }

  // Topics
  var tg = document.getElementById('topics-grid');
  tg.innerHTML = '';
  for (var i = 0; i < TOPICS.length; i++) {
    (function(topic, idx) {
      var isDone   = APP.completedTopics.indexOf(topic.id) !== -1;
      var isLocked = idx > 0 && APP.completedTopics.indexOf(TOPICS[idx-1].id) === -1;
      var div = document.createElement('div');
      div.className = 'topic-card ' + (isDone ? 'completed' : isLocked ? 'locked' : 'active-topic');
      div.innerHTML =
        '<div class="topic-icon">' + topic.icon + '</div>' +
        '<div class="topic-info"><div class="topic-name">' + topic.name + '</div><div class="topic-sub">' + topic.sub + '</div></div>' +
        '<div class="topic-badge ' + (isDone ? 'badge-done' : isLocked ? 'badge-lock' : 'badge-go') + '">' +
        (isDone ? '✓ Done' : isLocked ? '🔒' : '▶ Go') + '</div>';
      if (!isLocked) {
        div.onclick = function() { openLearn(topic.id); };
      }
      tg.appendChild(div);
    })(TOPICS[i], i);
  }

  // Levels
  var lg = document.getElementById('level-grid');
  lg.innerHTML = '';
  for (var i = 1; i <= 5; i++) {
    (function(lv) {
      var unlocked = APP.completedTopics.length >= (lv - 1) * 2;
      var div = document.createElement('div');
      div.className = 'level-btn ' + (unlocked ? 'active-lv' : 'locked-lv');
      div.innerHTML = '<div class="lv-num">' + lv + '</div><div>Level</div>';
      if (unlocked) div.onclick = function() { openArena(lv); };
      lg.appendChild(div);
    })(i);
  }
}

function openLearn(topicId) {
  APP.currentTopicId = topicId;
  APP.currentScenarioIdx = 0;
  var topic = getTopic(topicId);
  var persona = PERSONAS[APP.bizType] || PERSONAS.general;

  document.getElementById('learn-title').textContent = topic.icon + ' ' + topic.name;

  var html = '<div class="learn-icon">' + topic.icon + '</div>' +
    '<h2 class="learn-heading">' + topic.name + '</h2>' +
    '<p class="learn-intro">' + topic.intro + '</p>';

  for (var i = 0; i < topic.tips.length; i++) {
    html += '<div class="tip-card"><div class="tip-label">💡 ' + topic.tips[i].label + '</div><p>' + topic.tips[i].text + '</p></div>';
  }

  html += '<div class="author-quote"><p>' + topic.quote.text + '</p><div class="author-name">— ' + topic.quote.author + '</div></div>';
  html += '<div class="tip-card" style="border-color:var(--accent2)"><div class="tip-label" style="color:var(--accent2)">⚙️ Your Business Context</div><p>You serve <strong>' + persona.customer + 's</strong> with <strong>' + (APP.product || persona.product) + '</strong>. All scenarios are customized to your business!</p></div>';
  html += '<button class="practice-cta" id="start-practice-btn">⚡ Start Practice Scenarios</button>';
  html += '<div style="height:2rem"></div>';

  document.getElementById('learn-body').innerHTML = html;
  document.getElementById('start-practice-btn').onclick = function() { openPractice(); };
  show('learn');
}

document.getElementById('back-from-learn').onclick = function() {
  renderHome(); show('home');
};

function openPractice() {
  var topic = getTopic(APP.currentTopicId);
  document.getElementById('practice-title').textContent = '⚡ ' + topic.name;
  renderScenario();
  show('practice');
}

document.getElementById('back-from-practice').onclick = function() {
  openLearn(APP.currentTopicId);
};

function renderScenario() {
  var topic = getTopic(APP.currentTopicId);
  var scenarios = topic.scenarios;
  var idx = APP.currentScenarioIdx;

  if (idx >= scenarios.length) {
    showCompletion();
    return;
  }

  var sc = scenarios[idx];
  var letters = ['A','B','C','D'];
  var pb = document.getElementById('practice-body');

  var html = '<div style="font-size:.75rem;color:var(--muted);margin-bottom:.8rem">Scenario ' + (idx+1) + ' of ' + scenarios.length + '</div>' +
    '<div class="scenario-box"><div class="scenario-label">📋 SCENARIO</div><div class="scenario-text">' + sc.text + '</div></div>' +
    '<div class="options-list" id="opts">';

  for (var i = 0; i < sc.options.length; i++) {
    html += '<button class="option-btn" id="opt' + i + '" data-idx="' + i + '">' +
      '<div class="opt-letter">' + letters[i] + '</div><div>' + sc.options[i].text + '</div></button>';
  }

  html += '</div><div id="feedback-area"></div><div style="height:2rem"></div>';
  pb.innerHTML = html;
  pb.scrollTop = 0;

  // Attach click handlers
  for (var i = 0; i < sc.options.length; i++) {
    (function(optIdx) {
      document.getElementById('opt' + optIdx).onclick = function() {
        selectOption(optIdx);
      };
    })(i);
  }
}

function selectOption(optIdx) {
  var topic = getTopic(APP.currentTopicId);
  var sc = topic.scenarios[APP.currentScenarioIdx];
  var opt = sc.options[optIdx];

  // Disable all buttons
  var allBtns = document.querySelectorAll('.option-btn');
  for (var i = 0; i < allBtns.length; i++) {
    allBtns[i].onclick = null;
    allBtns[i].style.cursor = 'default';
  }

  var btn = document.getElementById('opt' + optIdx);
  var feedbackArea = document.getElementById('feedback-area');

  if (opt.correct) {
    btn.classList.add('correct');
    feedbackArea.innerHTML =
      '<div class="feedback-box fb-correct">' +
      '<div class="fb-title">✅ Excellent! Correct Answer!</div>' +
      '<div class="fb-text">Perfect! You applied the right technique. Well done! +50 XP</div></div>' +
      '<button class="action-btn btn-next" id="next-btn">Next Scenario →</button>';
    document.getElementById('next-btn').onclick = function() {
      APP.xp += 50;
      APP.currentScenarioIdx++;
      save();
      renderScenario();
    };
    APP.xp += 50;
    document.getElementById('xp-count').textContent = APP.xp;
    save();
  } else {
    btn.classList.add('wrong');
    feedbackArea.innerHTML =
      '<div class="feedback-box fb-wrong">' +
      '<div class="fb-title">❌ Not Quite Right</div>' +
      '<div class="fb-text">' + opt.feedback + '</div></div>' +
      '<button class="action-btn btn-retry" id="retry-btn">🔄 Try Again</button>';
    document.getElementById('retry-btn').onclick = function() {
      renderScenario();
    };
  }

  feedbackArea.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function showCompletion() {
  var topic = getTopic(APP.currentTopicId);
  if (APP.completedTopics.indexOf(topic.id) === -1) {
    APP.completedTopics.push(topic.id);
    APP.xp += 200;
    save();
  }
  document.getElementById('practice-body').innerHTML =
    '<div style="text-align:center;padding:2rem 1rem">' +
    '<div style="font-size:4rem;margin-bottom:1rem">🏆</div>' +
    '<h2 style="font-family:var(--font);font-size:1.5rem;color:var(--success);margin-bottom:.5rem">Topic Mastered!</h2>' +
    '<p style="color:var(--muted);font-size:.9rem;line-height:1.6;margin-bottom:1.5rem">You completed <strong>' + topic.name + '</strong>!<br>+200 XP earned!</p>' +
    '<button class="practice-cta" id="home-btn-done">🏠 Back to Dashboard</button></div>';
  document.getElementById('home-btn-done').onclick = function() {
    renderHome(); show('home');
  };
}

      {text:"Please check our website.", score:0}
    ]
  },
  { ai:"Okay, but what specifically do you do for businesses like mine?",
    opts:[
      {text:"Great question! We specialize in exactly what businesses in your industry need. May I ask – what challenges are you facing currently?", score:10},
      {text:"We are the best company in India.", score:-5},
      {text:"We have been in business since 2010 with many clients.", score:2}
    ]
  },
  { ai:"Why should I choose you over others?",
    opts:[
      {text:"3 reasons: 50+ satisfied clients, quality guarantee, and free after-sales support. But more importantly – what specific result matters most to YOU?", score:10},
      {text:"Because we are cheapest!", score:-5},
      {text:"I don't know, you can decide.", score:-10}
    ]
  },
  { ai:"I've had bad experiences with suppliers before. What makes you different?",
    opts:[
      {text:"I completely understand and I respect that. Could you tell me what went wrong before? I want to make sure we genuinely have the right solution for you.", score:10},
      {text:"Our company never makes mistakes, 100% guarantee!", score:-5},
      {text:"That was their fault not ours.", score:0}
    ]
  },
  { ai:"What would it cost me roughly?",
    opts:[
      {text:"Based on what you've shared, I'd estimate a range. But to give you an exact quote that fits your needs, may I ask about your typical monthly volume?", score:10},
      {text:"Very cheap! Whatever you want to pay!", score:-5},
      {text:"I'll send you a price list.", score:2}
    ]
  },
  { ai:"Let me think about it...",
    opts:[
      {text:"Of course Sir, take your time! Just so you have all the facts – this pricing is valid till end of month. Shall I block a tentative slot for you while you decide?", score:15},
      {text:"Please decide fast! Last chance today only!", score:-10},
      {text:"Okay, call me when you are ready.", score:-5}
    ]
  }
];

function openArena(level) {
  arenaState.level = level;
  arenaState.move = 0;
  arenaState.score = 0;
  arenaState.customerName = ['Ajay','Neha','Vikram','Priya','Rajesh Mehta'][level-1] || 'Customer';

  document.getElementById('arena-title').textContent = 'Level ' + level + ' – AI Customer';
  document.getElementById('arena-moves').textContent = 'Move 0/' + ARENA_SCRIPT.length;
  document.getElementById('arena-chat').innerHTML = '';
  document.getElementById('arena-options').innerHTML = '';

  show('arena');
  addMsg('ai', '👋 Hi! I am ' + arenaState.customerName + '. I got your message. Let\'s talk. ' +
    (level > 1 ? '(Note: I will be a tougher customer at this level!)' : ''));
  setTimeout(nextArenaMove, 800);
}

document.getElementById('back-from-arena').onclick = function() {
  renderHome(); show('home');
};

function addMsg(type, text) {
  var chat = document.getElementById('arena-chat');
  var div = document.createElement('div');
  div.className = 'msg ' + type;
  div.innerHTML = '<div class="msg-label">' + (type === 'ai' ? '🤖 ' + arenaState.customerName : '👤 You') + '</div>' +
    '<div class="msg-bubble">' + text + '</div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function nextArenaMove() {
  var move = arenaState.move;
  if (move >= ARENA_SCRIPT.length) { checkArenaEnd(); return; }

  var step = ARENA_SCRIPT[move];
  addMsg('ai', step.ai);

  var optContainer = document.getElementById('arena-options');
  optContainer.innerHTML = '';

  setTimeout(function() {
    for (var i = 0; i < step.opts.length; i++) {
      (function(opt) {
        var btn = document.createElement('button');
        btn.className = 'arena-opt';
        btn.textContent = opt.text;
        btn.onclick = function() {
          optContainer.innerHTML = '';
          addMsg('user', opt.text);
          arenaState.score += opt.score;
          arenaState.move++;
          document.getElementById('arena-moves').textContent = 'Move ' + arenaState.move + '/' + ARENA_SCRIPT.length;

          var reaction = opt.score >= 10 ? 'Hmm, that makes sense...' : opt.score > 0 ? 'Okay...' : 'That doesn\'t quite answer my concern.';
          setTimeout(function() {
            addMsg('ai', reaction);
            setTimeout(nextArenaMove, 700);
          }, 400);
        };
        optContainer.appendChild(btn);
      })(step.opts[i]);
    }
  }, 400);
}

function checkArenaEnd() {
  document.getElementById('arena-options').innerHTML = '';
  var won = arenaState.score >= 40;
  if (won) {
    addMsg('ai', '🎉 You know what, I am convinced! Let\'s go ahead. When can you start?');
    setTimeout(function() {
      var chat = document.getElementById('arena-chat');
      var div = document.createElement('div');
      div.className = 'win-banner';
      div.innerHTML = '<div class="win-icon">🏆</div>' +
        '<h2 style="color:var(--success);font-family:var(--font);font-size:1.3rem;margin-bottom:.4rem">You Won the Sale!</h2>' +
        '<p style="color:var(--muted);font-size:.85rem">Score: ' + arenaState.score + ' points<br>+500 XP earned!</p>' +
        '<button class="practice-cta" style="margin-top:1rem" id="arena-home-btn">Back to Dashboard</button>';
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      APP.xp += 500;
      document.getElementById('xp-count').textContent = APP.xp;
      save();
      document.getElementById('arena-home-btn').onclick = function() { renderHome(); show('home'); };
    }, 1000);
  } else {
    addMsg('ai', 'I am still not fully convinced. Score: ' + arenaState.score + '/40 needed to close.');
    setTimeout(function() {
      var chat = document.getElementById('arena-chat');
      var btn = document.createElement('button');
      btn.className = 'practice-cta';
      btn.style.margin = '1rem';
      btn.style.width = 'calc(100% - 2rem)';
      btn.textContent = '🔄 Try Again';
      btn.onclick = function() { openArena(arenaState.level); };
      chat.appendChild(btn);
      chat.scrollTop = chat.scrollHeight;
    }, 600);
  }
}

// ============================================================
// INIT
// ============================================================
window.onload = function() {
  if (load() && APP.userName) {
    renderHome();
    show('home');
  } else {
    show('onboard');
  }
};
</script>
